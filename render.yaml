services:
  # Backend API Service
  - type: web
    name: erp-analytics-api
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: Dockerfile
    # Docker context is the root directory where Dockerfile resides
    envVars:
      - key: PORT
        value: "8000"
      - key: CORS_ORIGINS
        value: "*"
    
  # Frontend Static Site
  - type: web
    name: erp-analytics-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: erp-analytics-api
          envVarKey: RENDER_EXTERNAL_URL
